summary: Complemento local de Moodle que detecta a los estudiantes inactivos en los
  cursos y les envía una notificación (correo electrónico emergente) para animarlos
  a retomar sus estudios. Admite plantillas de correo electrónico personalizadas,
  configurables desde el panel de administración.

# Verification pipeline for index pull requests (RFC §4.2).
#
# Two layers:
#   1. registry checks (Python / camp tools): schema validation, append-only
#      ledger enforcement, and source verification — clone the declared repo,
#      confirm the tag still points at the recorded commit, rebuild the
#      canonical ZIP deterministically, and compare hashes.
#   2. plugin checks (moodlehq/moodle-plugin-ci, unchanged from the standard
#      community workflow): the static subset the RFC names as the trust
#      floor — phplint, code checker, validate, savepoints. Full PHPUnit and
#      Behat runs remain the author's own CI's responsibility.
#
# Malware/behavioral scanning (RFC §4.2 step 5) is a planned third layer.

name: Index PR verification

# No paths filter, deliberately: "Index PR verification result" is a
# required status check, and a filtered-out workflow never reports, so a
# PR touching only workflows/docs would hang at "Expected" forever. The
# changed job costs a few seconds; every irrelevant job skips on its
# empty matrix and the result gate still reports green.
on:
  pull_request:

jobs:
  changed:
    name: Detect changed entries
    runs-on: ubuntu-24.04
    outputs:
      entries: ${{ steps.diff.outputs.entries }}
      checks: ${{ steps.diff.outputs.checks }}
      advisories: ${{ steps.diff.outputs.advisories }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: diff
        name: List changed entries and added releases as JSON matrices
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          entries=$(git diff --name-only --diff-filter=ACM \
              origin/${{ github.base_ref }}...HEAD -- 'plugins/**/*.yml' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "entries=$entries" >> "$GITHUB_OUTPUT"
          echo "Changed entries: $entries"

          advisories=$(git diff --name-only --diff-filter=ACM \
              origin/${{ github.base_ref }}...HEAD -- 'advisories/*.yml' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "advisories=$advisories" >> "$GITHUB_OUTPUT"
          echo "Changed advisories: $advisories"

          # Every release a PR adds gets its own moodle-plugin-ci legs on
          # the registry-target endpoint branches it declares support for
          # (D7) — not just the ledger-last release, which for a backfill
          # PR is an arbitrary one of several. A release supporting
          # neither endpoint gets no leg (registry checks still verify
          # it); that is a fact about its supported range, not a defect.
          python3 - "$entries" <<'EOF'
          import json, os, subprocess, sys, yaml
          ENDPOINTS = [("MOODLE_405_STABLE", "4.5", "8.2"),
                       ("MOODLE_502_STABLE", "5.2", "8.3")]
          base = "origin/" + os.environ["BASE_REF"]
          checks = []
          for path in json.loads(sys.argv[1]):
              head = yaml.safe_load(open(path))
              shown = subprocess.run(["git", "show", f"{base}:{path}"],
                                     capture_output=True, text=True)
              prior = yaml.safe_load(shown.stdout) if shown.returncode == 0 else None
              known = {str(r["version"]) for r in (prior or {}).get("releases") or []}
              for r in head.get("releases") or []:
                  if str(r["version"]) in known:
                      continue
                  legs = [(code, php) for code, branch, php in ENDPOINTS
                          if branch in (r.get("supported-moodle") or [])]
                  if not legs:
                      print(f"{path} {r['version']}: supported range covers no "
                            "registry-endpoint branch; no moodle-plugin-ci leg")
                  checks.extend({"entry": path, "source": head["source"],
                                 "version": str(r["version"]), "commit": r["commit"],
                                 "moodle-branch": code, "php": php}
                                for code, php in legs)
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write("checks=" + json.dumps(checks) + "\n")
          print("Release check legs:", json.dumps(checks, indent=2))
          EOF

  collision-warn:
    # Claim-time tripwire (camp-docs NAMESPACE.md): when a PR touches an
    # entry whose component has a recorded name-collision in the scan
    # ledger, surface the rival repository as a warning annotation and in
    # the job summary. Warn-only by design: continue-on-error keeps even a
    # crash here from gating the PR, and fork PRs run with a read-only
    # token, so the surfaces are annotations, never comments.
    name: Component name-collision warning
    needs: changed
    if: needs.changed.outputs.entries != '[]'
    continue-on-error: true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install camp tools
        run: pip install --quiet "git+https://github.com/camp-registry/camp-tools@v0.2.27"

      - name: Check changed components against the collision ledger
        env:
          ENTRIES: ${{ needs.changed.outputs.entries }}
        run: |
          for entry in $(echo "$ENTRIES" | jq -r '.[]'); do
            component=$(basename "$entry" .yml)
            out=$(camp check-collisions . --component "$component")
            if echo "$out" | grep -q '^name-collision:'; then
              echo "::warning title=Name collision on ${component}::A different repository also declares ${component}; resolve per NAMESPACE.md before approving a claim or source change."
              { echo "### Name collision: \`${component}\`"
                echo '```'
                echo "$out" | grep '^name-collision:'
                echo '```'
                echo "A different repository also declares this component."
                echo "Resolve per [NAMESPACE.md](https://github.com/camp-registry/camp-docs/blob/main/NAMESPACE.md) before approving a claim or source change."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  registry:
    name: Registry checks
    needs: changed
    if: needs.changed.outputs.entries != '[]'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(needs.changed.outputs.entries) }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install camp tools
        run: pip install --quiet "git+https://github.com/camp-registry/camp-tools@v0.2.27"

      - name: Validate entry
        run: camp validate "${{ matrix.entry }}"

      - name: Enforce append-only ledger
        run: |
          git show origin/${{ github.base_ref }}:"${{ matrix.entry }}" > /tmp/base-entry.yml 2>/dev/null \
            || rm -f /tmp/base-entry.yml
          camp ledger-check /tmp/base-entry.yml "${{ matrix.entry }}"

      - name: Verify releases against source
        run: camp verify "${{ matrix.entry }}"

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clamav
          sudo systemctl stop clamav-freshclam || true
          sudo freshclam || true

      - name: Malware scan (RFC §4.2 step 5 — hard failure on detection)
        run: camp scan-malware --entry "${{ matrix.entry }}" --require-engine

  advisories:
    # Advisory files (RFC §5.3): schema validation, flat-layout placement
    # (the filename is the registry-global id — see camp-tools advisory.py),
    # and the component-exists cross-check. Id collisions between concurrent
    # PRs surface as git add/add conflicts on the same path, so no explicit
    # uniqueness check is needed here.
    name: Advisory checks
    needs: changed
    if: needs.changed.outputs.advisories != '[]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install camp tools
        run: pip install --quiet "git+https://github.com/camp-registry/camp-tools@v0.2.27"

      - name: Validate advisories
        run: |
          camp validate-advisory ${{ join(fromJSON(needs.changed.outputs.advisories), ' ') }} --index-dir .

  plugin-checks:
    # One leg per (release added by this PR) x (registry-target endpoint
    # branch the release supports) — see the changed job. PHP is paired
    # per branch there: Moodle 5.2 requires PHP >= 8.3.
    name: moodle-plugin-ci (${{ matrix.entry }}, ${{ matrix.version }}, ${{ matrix.moodle-branch }})
    needs: [changed, registry]
    if: needs.changed.outputs.checks != '[]'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changed.outputs.checks) }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install camp tools
        run: pip install --quiet "git+https://github.com/camp-registry/camp-tools@v0.2.27"

      - name: Check out plugin source at the release under test
        run: |
          git clone "${{ matrix.source }}" plugin
          git -C plugin checkout --detach "${{ matrix.commit }}"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8

      - name: Install plugin into a fresh Moodle
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: pgsql
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: Disclosure-label heuristics (warn-only, RFC §4.7)
        if: ${{ !cancelled() }}
        run: |
          declared=$(python -c "import sys,yaml; print(','.join(yaml.safe_load(open(sys.argv[1])).get('labels',[])))" "${{ matrix.entry }}")
          camp lint-labels plugin ${declared:+--declared "$declared"}

      - name: Basic security lint (warn-only, RFC §4.2)
        if: ${{ !cancelled() }}
        run: camp audit plugin

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: Moodle Code Checker (warn-only, D23)
        # Style findings are quality signals, not trust signals: the floor
        # hard-blocks what affects trust (parse errors, structure, ledger
        # verification, malware); code style is surfaced here and judged by
        # humans at Tier 3 review.
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Validate plugin structure
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

  result:
    # Stable-name aggregate for branch protection: matrix job names vary
    # per changed entry, so protection requires this one check instead.
    name: Index PR verification result
    needs: [changed, registry, advisories, plugin-checks]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: All required jobs succeeded or were skipped
        run: |
          [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "false" ]

# Publish the rendered repository (RFC §4.5) on every index change.
#
# Generates the distribution tree from the index — the browse website,
# Composer metadata, the advisory feed, and the JSON Schemas at /schema/
# (so the schemas' $id URLs resolve) — and deploys it to GitHub Pages.
#
# Pages is the interim origin while the artifact tree is empty. When
# verified releases start landing, the origin moves to a host that can
# serve large artifact trees and offer rsync for mirrors (MIRRORING.md);
# this workflow's generate step stays the same and only the deploy step
# changes.

name: Publish site + repository metadata

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "advisories/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * *"   # daily: keeps generated-at-publish data fresh
                            # (relative dates, health dots, fetched badges)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  BASE_URL: https://camp-registry.org

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install camp tools
        run: pip install --quiet "git+https://github.com/camp-registry/camp-tools@v0.2.8"

      - name: Setup PHP (code checks)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer

      - name: Install Moodle Code Checker
        run: |
          composer global config --no-interaction allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --quiet moodlehq/moodle-cs
          echo "$(composer global config bin-dir --absolute --quiet)" >> "$GITHUB_PATH"

      - name: Generate the distribution tree
        run: |
          # Per-version code-check summaries (published at /checks/ for
          # transparency; also feeds the site's chips and badges).
          camp checks . dist/checks

          # Ingest listing manifests + screenshots from each released
          # plugin's repo at the ledger commit (pinned, sanitized).
          mkdir -p "$RUNNER_TEMP/listings"
          python - "$RUNNER_TEMP/listings" <<'EOF'
          import pathlib, subprocess, sys, tempfile, yaml
          out = sys.argv[1]
          for p in sorted(pathlib.Path("plugins").glob("*/*.yml")):
              e = yaml.safe_load(p.read_text())
              if not e["releases"] or e.get("status") == "delisted":
                  continue
              with tempfile.TemporaryDirectory() as td:
                  subprocess.run(["git", "clone", "-q", e["source"], td + "/src"],
                                 check=True)
                  subprocess.run(["camp", "ingest", str(p), "--source", td + "/src",
                                  "--out", out])
          EOF

          # The browse site lives at the tree root: / is the browse page,
          # /plugin/... the detail pages, machine paths alongside.
          camp site . "$BASE_URL" dist --listings "$RUNNER_TEMP/listings" --checks dist/checks
          camp composer . "$BASE_URL" dist/packages.json
          camp artifacts . dist/artifacts
          python -c "
          import camp, pathlib, shutil
          shutil.copytree(pathlib.Path(camp.__file__).parent / 'schema', 'dist/schema')
          "
          # Transitional: /site/ served the browse page for the first day.
          # A plain link, not an auto-redirect: day-one visitors may still
          # have the old root page (which pointed here) in browser cache,
          # and two instant redirects aimed at each other loop.
          mkdir -p dist/site
          cat > dist/site/index.html <<'EOF'
          <!DOCTYPE html><title>camp</title>
          <p>The site moved to the domain root:
          <a href="https://camp-registry.org/">camp-registry.org</a></p>
          EOF
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

# Hourly release watcher (#66): for each claimed (Tier 1+) plugin, if the
# most recently created version-parseable, non-prerelease tag in the
# listed source repository is not in the release ledger, publish it:
# compute the record registry-side and open the release PR as the
# automation app. Newest tag forward only; history is backfilled by
# explicit request (the Publish release issue form takes any tag).
# publish: manual in the plugin's .camp/listing.yml opts out of watching.
#
# Nothing here bypasses verification: every PR goes through the same
# independent index-pr rebuild/verify gate, and merges stay human.

name: Release watcher

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max new releases this run"
        default: "10"

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      candidates: ${{ steps.watch.outputs.candidates }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install camp tools
        run: pip install --quiet "git+https://github.com/camp-registry/camp-tools@v0.2.28"

      - id: watch
        name: Diff claimed repos' newest tags against the ledger
        env:
          GITHUB_TOKEN: ${{ github.token }}  # public reads only (.camp/listing.yml probes)
        run: |
          camp watch-releases . --limit ${{ inputs.limit || '10' }} > /tmp/candidates.tsv
          candidates=$(jq -R -s -c 'split("\n") | map(select(length > 0) | split("\t") | {component: .[0], tag: .[1], source: .[2]})' < /tmp/candidates.tsv)
          echo "candidates=$candidates" >> "$GITHUB_OUTPUT"
          echo "Candidates: $candidates"

  release:
    needs: detect
    if: needs.detect.outputs.candidates != '[]'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        candidate: ${{ fromJSON(needs.detect.outputs.candidates) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install camp tools
        run: pip install --quiet "git+https://github.com/camp-registry/camp-tools@v0.2.28"

      - name: Clone the source at the tag
        run: |
          git clone --branch "${{ matrix.candidate.tag }}" \
            "${{ matrix.candidate.source }}" /tmp/plugin

      - name: Compute and append the release record
        run: |
          component="${{ matrix.candidate.component }}"
          camp release "plugins/${component%%_*}/${component}.yml" \
            "${{ matrix.candidate.tag }}" --source /tmp/plugin

      - name: Mint app token
        id: app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      # The app (not GITHUB_TOKEN) must open the PR so the required
      # index-pr verification triggers. Same branch namespace as the
      # request form: an unmerged release PR is updated in place on later
      # runs, never duplicated.
      - name: Open the release PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app.outputs.token }}
          branch: release-request/${{ matrix.candidate.component }}-${{ matrix.candidate.tag }}
          commit-message: "${{ matrix.candidate.component }}: release ${{ matrix.candidate.tag }}"
          title: "${{ matrix.candidate.component }}: release ${{ matrix.candidate.tag }}"
          body: |
            Automated release (#66): the watcher found tag
            ${{ matrix.candidate.tag }} in the claimed source repository,
            absent from the ledger. camp CI will independently rebuild the
            artifact from the tag and verify the recorded hashes before
            this can merge.

# Serves camp/dist/ as one origin:
#   /            -> redirect to the browse site
#   /site/...    -> the generated browse website (RFC §4.5)
#   everything else (packages.json, artifacts/, security-advisories.json,
#                    TUF metadata) is the machine-readable repository that
#                    Composer and the tool_camp client fetch.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    autoindex on;              # browsable directory listings for artifacts
    charset utf-8;
    absolute_redirect off;     # keep the host:port the visitor used (relative Location)

    # Land human visitors on the browse site.
    location = / {
        return 302 /site/;
    }

    # Metadata is regenerated frequently; don't let the browser cache it.
    location = /packages.json            { add_header Cache-Control "no-cache"; }
    location = /security-advisories.json { add_header Cache-Control "no-cache"; }
}
